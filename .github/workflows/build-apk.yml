name: Build Android APK

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  workflow_dispatch:   # permet de déclencher manuellement depuis l'onglet Actions

jobs:
  build:
    name: Buildozer Android (debug APK)
    runs-on: ubuntu-22.04   # Buildozer fonctionne mieux sur 22.04 que 24.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            git zip unzip openjdk-17-jdk autoconf libtool pkg-config \
            zlib1g-dev libncurses-dev libncursesw5-dev libtinfo6 \
            cmake libffi-dev libssl-dev build-essential ccache \
            libltdl-dev gettext patch

      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-global-${{ hashFiles('MstreamTrader/buildozer.spec') }}
          restore-keys: |
            buildozer-global-

      - name: Cache Buildozer build directory
        uses: actions/cache@v4
        with:
          path: MstreamTrader/.buildozer
          key: buildozer-local-${{ hashFiles('MstreamTrader/buildozer.spec') }}
          restore-keys: |
            buildozer-local-

      - name: Install Buildozer + Cython
        run: |
          python -m pip install --upgrade pip
          pip install --user buildozer cython==0.29.36

      - name: Build APK (debug)
        working-directory: MstreamTrader
        run: |
          export PATH=$HOME/.local/bin:$PATH
          buildozer -v android debug

      - name: Locate built APK
        id: find-apk
        working-directory: MstreamTrader
        run: |
          APK=$(find bin -name "*.apk" -type f | head -n 1)
          if [ -z "$APK" ]; then
            echo "Aucun APK trouvé dans bin/"
            exit 1
          fi
          echo "apk_path=MstreamTrader/$APK" >> "$GITHUB_OUTPUT"
          echo "apk_name=$(basename $APK)" >> "$GITHUB_OUTPUT"
          ls -lh "$APK"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mstreamtrader-debug-apk
          path: ${{ steps.find-apk.outputs.apk_path }}
          retention-days: 30

      - name: Create Release on tag push
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.find-apk.outputs.apk_path }}
          name: Release ${{ github.ref_name }}
          body: |
            APK Android debug compilé automatiquement.
            Tag : ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
